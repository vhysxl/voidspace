syntax = "proto3";

package users.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "./users/v1;usersv1";

// UserService provides operations for user accounts, profiles, social connections, and auth.
service UserService {
  // ---------------------- AUTH ----------------------
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc RefreshToken(google.protobuf.Empty) returns (AuthResponse);

  // ---------------------- USER ----------------------
  rpc GetCurrentUser(google.protobuf.Empty) returns (GetCurrentUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserById(GetUserByIdRequest) returns (GetUserResponse);
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc ListFollowers(GetUserByIdRequest) returns (ListFollowersResponse);
  rpc ListFollowing(GetUserByIdRequest) returns (ListFollowingResponse);
  rpc Follow(FollowRequest) returns (FollowResponse);
  rpc Unfollow(UnfollowRequest) returns (UnfollowResponse);

  rpc DeleteUser(google.protobuf.Empty) returns (DeleteUserResponse);
  rpc RestoreUser(RestoreUserRequest) returns (RestoreUserResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
}

// ---------------------- REQUEST MESSAGES ----------------------

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message LoginRequest {
  string email_or_username = 1;
  string password = 2;
}

message GetUserRequest {
  string username = 1;
}

message GetUserByIdRequest {
  int64 user_id = 1;
}

message GetUsersRequest {
  repeated int64 user_ids = 1;
}

message UpdateProfileRequest {
  optional string display_name = 1;
  optional string bio = 2;
  optional string avatar_url = 3;
  optional string banner_url = 4;
  optional string location = 5;
}

message FollowRequest {
  int64 user_id = 1;
}

message UnfollowRequest {
  int64 user_id = 1;
}

message RestoreUserRequest {
  int64 user_id = 1;
}

message SearchUsersRequest {
  string query = 1;
}

// ---------------------- RESPONSE MESSAGES ----------------------

message AuthResponse {
  string access_token = 1;
  optional string refresh_token = 2;
  int64 expires_in = 3;
  string message = 4;
}

message GetCurrentUserResponse {
  UserProfile user = 1;
}

message GetUserResponse {
  UserProfile user = 1;
}

message GetUsersResponse {
  repeated UserProfile users = 1;
}

message ListFollowersResponse {
  repeated UserBanner users = 1;
}

message ListFollowingResponse {
  repeated UserBanner users = 1;
}

message UpdateProfileResponse {}

message DeleteUserResponse {}

message RestoreUserResponse {}

message FollowResponse {}

message UnfollowResponse {}

message SearchUsersResponse {
  repeated UserBanner users = 1;
}

// ---------------------- DATA MODELS ----------------------

message UserProfile {
  int64 id = 1;
  string username = 2;
  string display_name = 3;
  string bio = 4;
  string avatar_url = 5;
  string banner_url = 6;
  string location = 7;
  int64 followers = 8;
  int64 following = 9;
  google.protobuf.Timestamp created_at = 10;
  bool is_followed = 11;
}

message UserBanner {
  int64 id = 1;
  string username = 2;
  string display_name = 3;
  string avatar_url = 4;
}
